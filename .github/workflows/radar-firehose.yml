name: Radar Aggregator Firehose

on:
  schedule:
    - cron: "45 2,14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Shares the radar-data group so its jobs.json commit can never race the
# 6-hourly refresh or the weekly scout.
concurrency:
  group: radar-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  firehose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scout deps
        run: |
          python -m venv scout/.venv
          scout/.venv/bin/pip install -r scout/requirements.txt
          scout/.venv/bin/python -m playwright install --with-deps chromium
      - name: Scrape aggregators + apply cap-exempt filter
        run: npm run scout:aggregators -- --all --details 150 --import
      - name: Refresh dataset
        run: npm run radar:refresh
        env:
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      - name: Rebase onto latest main (humans push while CI runs)
        run: git pull --rebase --autostash
      - name: Commit firehose data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update aggregator firehose data"
          file_pattern: "radar/data/aggregated-jobs.json radar/data/refresh-report.json"
      - name: Alert on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && { echo "NTFY_TOPIC not set; skipping alert"; exit 0; }
          curl -sS -H "Title: ${{ github.workflow }} failed" \
            -H "Tags: rotating_light" \
            -d "Workflow '${{ github.workflow }}' failed on ${{ github.ref_name }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.sh/$NTFY_TOPIC" || true
