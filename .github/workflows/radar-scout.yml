name: Radar Employer Scout

# Scouts registry employers that have no clean ATS feed (Playwright page
# triage per radar/SCOUT-CONTRACT.md). Snapshots expire after 14 days, so a
# weekly run keeps the scouted employers continuously covered.
on:
  schedule:
    - cron: "35 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

# Shares the radar-data group so its jobs.json commit can never race the
# other refresh workflows.
concurrency:
  group: radar-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scout deps
        run: |
          python -m venv scout/.venv
          scout/.venv/bin/pip install -r scout/requirements.txt
          scout/.venv/bin/python -m playwright install --with-deps chromium
      - name: Scout employers without ATS feeds
        run: npm run scout:jobs -- --all --import
      - name: Refresh dataset
        run: npm run radar:refresh
        env:
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Rebase onto latest main (humans push while CI runs)
        run: git pull --rebase --autostash
      - name: Commit scouted data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update scouted employer data"
          file_pattern: "radar/data/scouted-jobs.json radar/data/refresh-report.json"
