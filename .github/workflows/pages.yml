name: Deploy Dashboard to Pages

# Publishes the dashboard + committed data as a static site. Bot data commits
# use GITHUB_TOKEN and cannot trigger other workflows, so a schedule shortly
# after each refresh keeps the published data fresh.
on:
  schedule:
    - cron: "50 */6 * * *"
  push:
    branches: [main]
    paths: ["radar/public/**", ".github/workflows/pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p site/data
          cp radar/public/* site/
          cp radar/data/refresh-report.json radar/data/discovery-candidates.json site/data/
          cp radar/employers.json site/data/employers.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Alert on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && { echo "NTFY_TOPIC not set; skipping alert"; exit 0; }
          curl -sS -H "Title: ${{ github.workflow }} failed" \
            -H "Tags: rotating_light" \
            -d "Workflow '${{ github.workflow }}' failed on ${{ github.ref_name }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.sh/$NTFY_TOPIC" || true
