name: Research Job Radar

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# All workflows that commit radar data share one concurrency group so their
# pushes serialize instead of racing to a non-fast-forward failure.
concurrency:
  group: radar-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Refresh public ATS data
        run: npm run radar:refresh
        env:
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      - name: Rebase onto latest main (humans push while CI runs)
        run: git pull --rebase --autostash
      - name: Commit refreshed radar data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update research radar data"
          file_pattern: "radar/data/refresh-report.json"
      - name: Alert on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && { echo "NTFY_TOPIC not set; skipping alert"; exit 0; }
          curl -sS -H "Title: ${{ github.workflow }} failed" \
            -H "Tags: rotating_light" \
            -d "Workflow '${{ github.workflow }}' failed on ${{ github.ref_name }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.sh/$NTFY_TOPIC" || true
