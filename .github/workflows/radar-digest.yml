name: Radar Daily Digest

# Pushes a daily "what's new" notification via ntfy.sh, ranked by sponsorship
# evidence. Reads the dataset from Supabase (falling back to committed
# jobs.json), fetches nothing, and never commits. Skips cleanly (prints instead
# of pushing) until the NTFY_TOPIC secret is set.
on:
  schedule:
    - cron: "5 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: radar-digest
  cancel-in-progress: true

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build and send digest
        run: node radar/scripts/digest.js
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Alert on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && { echo "NTFY_TOPIC not set; skipping alert"; exit 0; }
          curl -sS -H "Title: ${{ github.workflow }} failed" \
            -H "Tags: rotating_light" \
            -d "Workflow '${{ github.workflow }}' failed on ${{ github.ref_name }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.sh/$NTFY_TOPIC" || true
